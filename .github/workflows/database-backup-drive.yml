name: Backup diario do banco -> Google Drive

# Faz pg_dump completo do Nexus e envia pra pasta do  Google Drive do Fabricio.
# Roda todo dia as 21h de Brasilia. Retencao de 30 dias na pasta.
#
# Secrets necessarios no repositorio (Settings  Secrets  Actions):
#   NEXUS_BACKUP_DB_URL        string de conexao do Postgres (role so-leitura)
#   BACKUP_DRIVE_ACCESS_URL    URL da edge function drive-access-token
#   BACKUP_SHARED_SECRET       segredo compartilhado com a edge function
#   BACKUP_ANON_KEY            anon key do Supabase (Authorization da edge)
#   BACKUP_DRIVE_FOLDER_ID     id da pasta do Drive

on:
  schedule:
    - cron: '0 0 * * *'   # 00:00 UTC = 21:00 America/Sao_Paulo
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RETENTION_DAYS: '30'
    steps:
      - name: Instalar cliente Postgres 17
        run: |
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get -qq update
          sudo apt-get -qq install -y postgresql-client-17
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: pg_dump (schema public completo, formato custom comprimido)
        env:
          DB_URL: ${{ secrets.NEXUS_BACKUP_DB_URL }}
        run: |
          FILE="backup-unv-nexus-$(TZ=America/Sao_Paulo date +%Y-%m-%d-%H%M).dump"
          echo "FILE=$FILE" >> "$GITHUB_ENV"
          /usr/lib/postgresql/17/bin/pg_dump "$DB_URL" \
            --format=custom \
            --compress=6 \
            --schema=public \
            --no-owner \
            --no-privileges \
            --file="$FILE"
          ls -lh "$FILE"

      - name: Enviar pro  Google Drive + retencao
        env:
          DRIVE_ACCESS_URL: ${{ secrets.BACKUP_DRIVE_ACCESS_URL }}
          SHARED_SECRET: ${{ secrets.BACKUP_SHARED_SECRET }}
          ANON_KEY: ${{ secrets.BACKUP_ANON_KEY }}
          FOLDER_ID: ${{ secrets.BACKUP_DRIVE_FOLDER_ID }}
        run: |
          python3 - << 'PYEOF'
          import os, json, urllib.request, urllib.parse, datetime

          # 1. access token do Drive via edge function (credenciais Google ficam no Supabase)
          req = urllib.request.Request(os.environ['DRIVE_ACCESS_URL'], method='POST', headers={
              'x-backup-secret': os.environ['SHARED_SECRET'],
              'Authorization': 'Bearer ' + os.environ['ANON_KEY'],
          })
          ACCESS = json.load(urllib.request.urlopen(req))['access_token']

          def api(url, method='GET', data=None, headers=None):
              h = {'Authorization': f'Bearer {ACCESS}', **(headers or {})}
              req = urllib.request.Request(url, method=method, headers=h,
                  data=(json.dumps(data).encode() if data is not None else None))
              if data is not None: req.add_header('Content-Type', 'application/json')
              with urllib.request.urlopen(req) as r:
                  body = r.read()
                  return (json.loads(body) if body else {}), dict(r.headers)

          fname = os.environ['FILE']
          folder = os.environ['FOLDER_ID']
          size = os.path.getsize(fname)
          print(f'Enviando {fname} ({size/1024/1024:.1f} MB)')

          # 2. sessao de upload resumable
          meta = {'name': fname, 'parents': [folder], 'mimeType': 'application/octet-stream'}
          _, hdrs = api(
              'https://www.googleapis.com/upload/drive/v3/files?uploadType=resumable&supportsAllDrives=true',
              'POST', meta, headers={'X-Upload-Content-Length': str(size)})
          session = hdrs['Location']

          # 3. upload em chunks de 32MB (redirect manual: Google devolve 308 nos chunks)
          CHUNK = 32 * 1024 * 1024
          opener = urllib.request.build_opener(type('NoRedirect', (urllib.request.HTTPRedirectHandler,), {
              'redirect_request': lambda self, *a, **k: None})())
          sent = 0
          with open(fname, 'rb') as f:
              while sent < size:
                  blob = f.read(CHUNK)
                  end = sent + len(blob) - 1
                  req = urllib.request.Request(session, method='PUT', data=blob, headers={
                      'Content-Length': str(len(blob)),
                      'Content-Range': f'bytes {sent}-{end}/{size}',
                  })
                  try:
                      resp = opener.open(req)
                      if resp.status in (200, 201):
                          print('Upload concluido, file id:', json.loads(resp.read()).get('id'))
                  except urllib.error.HTTPError as e:
                      if e.code != 308:
                          raise
                  sent += len(blob)
                  print(f'  {sent/1024/1024:.0f}/{size/1024/1024:.0f} MB')

          # 4. retencao: backups com mais de RETENTION_DAYS vao pra lixeira
          days = int(os.environ.get('RETENTION_DAYS', '30'))
          cutoff = (datetime.datetime.utcnow() - datetime.timedelta(days=days)).strftime('%Y-%m-%dT%H:%M:%S')
          q = urllib.parse.quote(
              f"'{folder}' in parents and name contains 'backup-unv-nexus-' "
              f"and createdTime < '{cutoff}' and trashed = false")
          old, _ = api(f'https://www.googleapis.com/drive/v3/files?q={q}&fields=files(id,name)&pageSize=100&supportsAllDrives=true&includeItemsFromAllDrives=true')
          for fo in old.get('files', []):
              api(f"https://www.googleapis.com/drive/v3/files/{fo['id']}?supportsAllDrives=true", 'PATCH', {'trashed': True})
              print('Removido (retencao):', fo['name'])
          print(f'Retencao: {len(old.get("files", []))} arquivo(s) antigos removidos')
          PYEOF
