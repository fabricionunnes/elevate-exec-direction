name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  # ── UNV project (czmyjgdixwhpfasfugkm) ────────────────────────────────────
  deploy-unv:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy agente-unv
        continue-on-error: true
        run: supabase functions deploy agente-unv --project-ref czmyjgdixwhpfasfugkm --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy mastermind-submit
        continue-on-error: true
        run: supabase functions deploy mastermind-submit --project-ref czmyjgdixwhpfasfugkm --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ── Nexus / elevate-exec-direction (xrncvhzxjmddqluxoosu) ─────────────────
  deploy-nexus:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all Nexus edge functions
        run: supabase functions deploy --project-ref xrncvhzxjmddqluxoosu --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
